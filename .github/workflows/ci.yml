name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libxxhash-dev valgrind

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run functional tests
        run: valgrind --leak-check=full --error-exitcode=1 ./build/test_functional
